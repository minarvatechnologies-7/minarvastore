<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Minarva Biz" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <title>Minarva Biz - Sevenseas ERP</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0f172a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Service Worker registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW error:', err));
        });
      }
      // Auto redirect to field app if employee phone saved
      (function() {
        const stored = localStorage.getItem('emp_phone');
        if (stored && !window.location.hash.includes('field')) {
          window.location.hash = 'field';
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
